spring:
  datasource:
    url: jdbc:postgresql://YOUR_DB_HOST:5432/analyzer
    username: YOUR_DB_USER
    password: YOUR_DB_PASSWORD
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: never

# ---------------------------------------------------------------------------
# MyBatis configuration
# ---------------------------------------------------------------------------
mybatis:
  # Location of the XML mapper files (classpath relative).
  mapper-locations: classpath:mapper/*.xml
  configuration:
    # Map snake_case DB columns to camelCase Java fields automatically.
    map-underscore-to-camel-case: true
    # Return an empty collection instead of null for list-returning queries.
    return-instance-for-empty-row: false
    # Log SQL statements at TRACE level (set to NONE in production).
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

subsystem:
  llm:
    enabled: false
    base-url: https://aipro.sdsdev.co.kr/general/api/v1
    api-key: 5a502d87-efb4-4783-8e2e-521331ae6e01
    service-id: Analyzer
    user-identifier: s.mayank@samsung.com
    model-id: "42"
    max-tokens: 24576
    temperature: 1.0
    top-k: 0
    connect-timeout-ms: 5000
    read-timeout-ms: 60000
